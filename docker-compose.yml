# Development environment for an a-blog cms plugin.
# Uses the all-in-one image (appleple/acms; in preparation) and bind-mounts this plugin into
# extension/plugins/. Until that image is published, you can substitute the public
# appleple/acms-dev runtime image and drop the core ZIP in manually (see the docs).
services:
  acms:
    image: appleple/acms:${ACMS_IMAGE_TAG:-3.2-php8.5}
    ports:
      - '8080:80'
    environment:
      ACMS_DB_HOST: db
      ACMS_DB_NAME: acms
      ACMS_DB_USER: acms
      ACMS_DB_PASS: acms
    volumes:
      # Production code lives in src/, which is deployed as the plugin itself.
      # Adjust the target path to match the layout of the all-in-one image.
      - ./src:/var/www/html/extension/plugins/Skeleton
      # The whole repository (composer.json, tests/, src/) — run composer & tests from here.
      - .:/workspace
    depends_on:
      db:
        condition: service_healthy
  db:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: acms
      MYSQL_USER: acms
      MYSQL_PASSWORD: acms
      MYSQL_ROOT_PASSWORD: root
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-uroot', '-proot']
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - db-data:/var/lib/mysql

volumes:
  db-data:
