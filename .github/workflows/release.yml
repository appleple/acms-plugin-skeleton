name: Release

# Build the plugin zip (scripts/package.php) and publish it as a GitHub Release.
# Pushing a tag like v1.2.3 triggers this.
#
# The plugin version lives in src/ServiceProvider.php ($version). Keep the tag and that value in
# sync — the "Verify" step below fails the run if they disagree, so no mismatched zip is published.
#
# This workflow ships in every generated plugin. On the skeleton repo itself, tagging (for Packagist)
# must NOT publish a meaningless "Skeleton" zip, so the job is skipped there — detected via
# scripts/namespace.php, which only exists until `composer create-project` runs it (it self-deletes).
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Skip release on the unrenamed skeleton
        id: guard
        run: |
          if [ -f scripts/namespace.php ]; then
            echo "scripts/namespace.php present — this is the skeleton, not a generated plugin. Skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up PHP
        if: steps.guard.outputs.skip != 'true'
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: zip
          tools: composer

      - name: Verify tag matches ServiceProvider $version
        if: steps.guard.outputs.skip != 'true'
        run: php scripts/package.php --check-version="${GITHUB_REF_NAME#v}"

      - name: Create release package
        if: steps.guard.outputs.skip != 'true'
        run: php scripts/package.php

      - name: Create GitHub Release
        if: steps.guard.outputs.skip != 'true'
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes \
            ./build/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
