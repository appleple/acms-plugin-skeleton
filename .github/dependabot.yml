# Keep the GitHub Actions used by the workflows up to date. Patch and minor bumps are auto-merged
# by .github/workflows/dependabot-auto-merge.yml once CI passes; major bumps are reviewed by hand.
#
# Composer is intentionally not tracked: ablogcms/testing-framework is a private package Dependabot
# can't resolve without extra registry config, and its constraint is widened by hand
# (e.g. 3.2.* || 3.3.*) per tested a-blog cms minor. Generated plugins still commit composer.lock
# for reproducible installs — Dependabot just isn't the tool that maintains it.
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
